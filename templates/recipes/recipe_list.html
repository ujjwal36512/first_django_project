<!DOCTYPE html>
<html>
<head>
    <title>All Recipes</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .recipe-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .recipe-card img { width: 100%; height: 150px; object-fit: cover; }
        .recipe-card .content { padding: 15px; }
        .recipe-card h3 { margin: 0; }
        .author { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>All Recipes</h1>
        <a href="{% url 'home' %}">← Back to Home</a>
    </div>
    
    <div class="recipe-grid">
        {% for recipe in recipes %}
            <div class="recipe-card">
                {% if recipe.cover_image %}
                    <img src="{{ recipe.cover_image.url }}" alt="{{ recipe.title }}">
                {% else %}
                    <div style="height: 150px; background: #e9ecef; display: flex; align-items: center; justify-content: center;">No Image</div>
                {% endif %}
                <div class="content">
                    <h3><a href="{% url 'recipe_detail' recipe.pk %}">{{ recipe.title }}</a></h3>
                    <p class="author">by {{ recipe.user.full_name }}</p>
                </div>
            </div>
        {% empty %}
            <p>No recipes found.</p>
        {% endfor %}
    </div>
</body>
</html>
